<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>EmailTool • Caixa</title><link rel="stylesheet" href="/static/style.css"></head><body><div class="container"><div class="topbar"><div class="brand">EmailTool <span class="badge">Operações em lote</span></div><div class="badge" id="kpi_status">Status: pronto</div></div><div class="grid"><div class="card"><div class="hd"><div><h2>Filtros</h2><div class="sub">Datas em formato IMAP (ex.: <span class="code">01-Jan-2026</span>).</div></div></div><div class="bd"><div class="field"><label>Pasta (opcional)</label><input class="input" id="folder" placeholder="INBOX (ou vazio)"></div><div class="row2"><div class="field"><label>Data inicial (SINCE)</label><input class="input" id="start_date" placeholder="01-Jan-2026"></div><div class="field"><label>Data final (BEFORE)</label><input class="input" id="end_date" placeholder="01-Feb-2026"></div></div><div class="field"><label>Buscar no corpo (BODY)</label><input class="input" id="search" placeholder="Ex.: reset password, OTP, assinatura, invoice..."></div><div class="field"><label>Categoria</label><select id="category"><option value="">Todas</option><option value="password_recovery">Recuperação de senha</option><option value="subscription">Assinaturas</option><option value="other">Outros</option></select></div><div class="btns"><button class="btn primary" onclick="loadEmails(1)">Filtrar</button><button class="btn" onclick="loadEmails(1)">Recarregar</button></div><div class="hr"></div><div class="field"><label>Ação em lote</label><select id="bulk_action"><option value="trash">Enviar para lixeira</option><option value="move">Mover para pasta</option><option value="delete">Excluir definitivamente</option><option value="create_folder">Criar pasta</option></select></div><div class="field"><label>Pasta destino (se aplicável)</label><input class="input" id="target_folder" placeholder="Ex.: Assinaturas/Netflix"></div><div class="btns"><button class="btn danger" onclick="executeAction()">Executar</button><button class="btn" onclick="exportXlsx()">Exportar XLSX</button></div><div class="small" id="status"></div></div></div><div class="card"><div class="hd"><div><h2>E-mails</h2><div class="sub">Marque itens e execute ações em lote. Exportar respeita os filtros.</div></div><div class="badge">Página <span class="code" id="page">1</span> • Total <span class="code" id="total">0</span></div></div><div class="bd"><div class="table-wrap"><table><thead><tr><th style="width:36px;"><input type="checkbox" id="select_all"/></th><th style="width:190px;">Data</th><th style="width:240px;">Remetente</th><th>Assunto</th><th style="width:170px;">Categoria</th><th style="width:280px;">Trecho</th></tr></thead><tbody id="tbody"></tbody></table></div><div class="pager"><button class="btn" onclick="prevPage()">Anterior</button><div class="muted">Refine nos filtros à esquerda.</div><button class="btn" onclick="nextPage()">Próxima</button></div></div></div></div></div><script src="/static/app.js"></script></body></html>
